trigger:
- main

pool:
  name: 'Default'

steps:
- task: AzureRmWebAppDeployment@4
  inputs:
    ConnectionType: 'AzureRM'
    azureSubscription: 'LabConnectionFinal'
    appType: 'webAppLinux'
    WebAppName: 'fatimah-devops-lab'
    packageForLinux: '$(System.DefaultWorkingDirectory)'
    # This tells Azure to use the index.html as the main entry point
    RuntimeStack: 'STATICSITE|1.0'