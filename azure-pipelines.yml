trigger:
- main

pool:
  name: 'Default'

steps:
- script: echo "Starting deployment for Fatimah's DevOps Lab..."
  displayName: 'Initialization'

- task: AzureRmWebAppDeployment@4
  inputs:
    ConnectionType: 'AzureRM'
    azureSubscription: 'LabConnectionFinal'  # Ensure this name is correct
    appType: 'webAppLinux'
    WebAppName: 'fatimah-devops-lab' 
    # FIX: We are now pointing to the folder itself, not a missing .war file
    packageForLinux: '$(System.DefaultWorkingDirectory)'