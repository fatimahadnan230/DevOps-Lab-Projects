trigger:
- main

pool:
  name: 'Default'

steps:
- script: |
    echo "--- Locating Files ---"
    dir
    
    echo "--- Attempting Compilation ---"
    # The '|| echo' prevents the whole pipeline from crashing if javac fails
    javac test.java || echo "Javac failed, skipping to packaging..."
    
    echo "--- Creating ROOT.war ---"
    # We create a simple war file. If .class files exist, they are included.
    # If not, it just packages the index.html.
    jar cvf ROOT.war index.html *.txt *.py
    if exist "*.class" (jar uvf ROOT.war *.class)
  displayName: 'Compile and Package as ROOT'

- task: AzureRmWebAppDeployment@4
  inputs:
    ConnectionType: 'AzureRM'
    azureSubscription: 'LabConnectionFinal'
    appType: 'webAppLinux'
    WebAppName: 'fatimah-devops-lab'
    packageForLinux: '$(System.DefaultWorkingDirectory)/ROOT.war'