trigger:
- main

pool:
  name: 'Default'

steps:
# Step 1: Echo to confirm the pipeline is starting (optional)
- script: echo "Starting deployment to Azure App Service..."
  displayName: 'Initialization'

# Step 2: The actual Deployment Task
- task: AzureRmWebAppDeployment@4
  inputs:
    ConnectionType: 'AzureRM'
    # Use the name of the service connection you just verified/saved
    azureSubscription: 'LabConnectionFinal'  
    appType: 'webAppLinux'
    # CHANGE THIS to your actual Web App name from the Azure Portal
    WebAppName: 'fatimah-devops-lab' 
    # This looks for the .war file in your repository to deploy
    packageForLinux: '$(System.DefaultWorkingDirectory)/**/*.war'